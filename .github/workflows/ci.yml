name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: twitchdropsminer-web

jobs:
  docker:
    name: Build, test, and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        run: echo "ref=${REGISTRY}/${{ steps.owner.outputs.name }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js for frontend checks
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend syntax and rendering checks
        run: |
          node --check web/static/js/main.js
          node --check web/static/js/lazy-loader.js
          node --check web/static/js/drop-progress.js
          node --check web/static/js/advanced-mode.js
          APP_ROOT="$PWD" node tests/test_inventory_card_rendering.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image for tests
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.ref }}:ci
          cache-from: type=gha
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Python compile checks inside image
        run: |
          docker run --rm --entrypoint python ${{ steps.image.outputs.ref }}:ci \
            -m py_compile docker_main.py web/app.py channel.py twitch.py inventory.py constants.py web/auth.py

      - name: Backend helper tests inside image
        run: |
          docker run --rm \
            --entrypoint python \
            ${{ steps.image.outputs.ref }}:ci \
            /app/tests/test_web_dashboard_helpers.py

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
