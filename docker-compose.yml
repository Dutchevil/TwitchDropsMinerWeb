services:  
  twitch-drops-miner: 
    image: ghcr.io/dutchevil/twitchdropsminer-web:${TAG:-latest}
    container_name: ${CONTAINER_NAME:-twitchdropsminer-web}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    volumes:
      - ${DATA_DIR:-./data}:/data
    environment:
      - TZ=${TIMEZONE:-UTC}
      - PORT=${PORT:-8080}
      - DOCKER_CONTAINER=true
    # Optional resource constraints - uncomment and adjust as needed
